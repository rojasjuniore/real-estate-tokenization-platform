name: Verify Contracts

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Network to verify on'
        required: true
        default: 'polygonAmoy'
        type: choice
        options:
          - polygonAmoy
          - polygon
      contract_address:
        description: 'Contract address to verify (leave empty to verify all)'
        required: false
        type: string

env:
  NODE_VERSION: '20'

jobs:
  verify:
    name: Verify Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npx hardhat compile

      - name: Verify contracts
        run: |
          if [ -n "${{ inputs.contract_address }}" ]; then
            npx hardhat verify --network ${{ inputs.network }} ${{ inputs.contract_address }}
          else
            npx hardhat run scripts/verify.ts --network ${{ inputs.network }}
          fi
        env:
          POLYGONSCAN_API_KEY: ${{ secrets.POLYGONSCAN_API_KEY }}
